[package]
name = "sulix-intel"
version = "0.1.0"
edition = "2021"
description = "Sulix Intelligence — 个人创业者的 AI 战略情报助手"

[dependencies]
# RSS 解析
feed-rs = { version = "2.2", features = ["sanitize"] }

# 异步 HTTP
reqwest = { version = "0.12", features = ["json"] }
tokio = { version = "1", features = ["full"] }

# 数据库
rusqlite = { version = "0.32", features = ["bundled"] }

# 序列化
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# 日期处理
chrono = { version = "0.4", features = ["serde"] }

# 日志
log = "0.4"
env_logger = "0.11"

# 错误处理
anyhow = "1"
thiserror = "2"

# 正文提取（P0）
scraper = "0.22"
