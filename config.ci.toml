# Sulix Intelligence — CI 配置
# 用于 GitHub Actions runner，路径均为相对路径

[llm]
provider = "deepseek"
model = "deepseek-v4-flash"
base_url = "https://api.deepseek.com/v1"
max_tokens = 4096
temperature = 0.3

[output]
vault_path = "./DailyBrief"
mdx_dir = "./content"
frontend_public_dir = "./public"

[storage]
data_dir = "./data"

[r2]
bucket = "sulix-content"
endpoint = "https://a754cffcd8dfec7a51c66164863f16b8.r2.cloudflarestorage.com"
public_url = "https://pub-253c4c23dbe0465aac15cb4fc2402c13.r2.dev"
enabled = true

# === 信号源 ===
[[sources]]
name = "Hacker News - Front Page"
type = "rss"
url = "https://hnrss.org/frontpage"
category = "AI Competition"
layer = 3
enabled = true

[[sources]]
name = "OpenAI Blog"
type = "rss"
url = "https://openai.com/news/rss.xml"
category = "AI"
layer = 2
score = 10
enabled = true

[[sources]]
name = "Anthropic Blog"
type = "rss"
url = "https://www.anthropic.com/rss.xml"
category = "AI"
layer = 2
score = 10
enabled = true

[[sources]]
name = "Google DeepMind Blog"
type = "rss"
url = "https://deepmind.google/blog/rss.xml"
category = "AI"
layer = 2
enabled = true

[[sources]]
name = "US Federal Register - Technology Controls"
type = "rss"
url = "https://www.federalregister.gov/api/v1/documents.rss?conditions[agencies][]=commerce-department&conditions[term]=semiconductor"
category = "Regulatory Compliance"
layer = 2
enabled = true
