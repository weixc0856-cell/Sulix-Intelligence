# Sulix Intelligence — 配置示例
# 复制为 config.toml 并填入你的设置

# 🔑 API Key 说明
# config.toml 已在 .gitignore 中，不会上传 GitHub。放心在本地填写。
# 环境变量可替代 config key。各 provider 的 env var 名不同（见下方）。

[llm]
# provider: "deepseek" | "openai" | "perplexity"（默认 deepseek）
provider = "deepseek"
# API Key — deepseek 和 openai 用此字段，perplexity 用 perplexity_key
api_key = ""
# API Key 环境变量名：
#   deepseek   → DEEPSEEK_API_KEY 或 api_key
#   openai     → OPENAI_API_KEY 或 api_key
#   perplexity → PERPLEXITY_API_KEY 或 perplexity_key
perplexity_key = ""
# deepseek-v4-flash = 非思考模式（当前使用）
# deepseek-v4-pro   = 带思考模式的推理模型
model = "deepseek-v4-flash"
base_url = "https://api.deepseek.com/v1"
max_tokens = 4096
temperature = 0.1

[output]
# 日报输出目录（CI 通过 VAULT_PATH 环境变量覆盖为 "./output"）
vault_path = "./DailyBrief"
# MDX 输出目录（CI 里会写到 ./output/，然后被 cp 到 frontend/src/content/）
mdx_dir = "./output"
# 前端 Content Collections 目录（可选）
# 设置后，manifest.json 也会被同步到此目录所在的 public/manifest.json。
# 引擎直接写入前端 content 目录，消除 CI 复制 gap（路径相对于项目根目录）
frontend_public_dir = "../intel-web/public/"

[storage]
data_dir = "./data"

# ===== Phase A: Scan Agent =====
[scan_agent]
# 启用后，LLM 分析前先做轻量初筛
enabled = true

# ===== RSS 源 =====
# 在此添加你关注的 RSS 源。每项一个 [[sources]] 块。
#
# layer 字段：
#   1 = 内参学习（仅后台 LLM 认知校准，前端不展示溯源链接）
#   2 = 官方权威源（Public Domain，可公开引用）
#   3 = 极客社区（群体智慧筛选）
#   4 = 市场数据
#
# public 字段（默认 true）：
#   false = 前端不显示该源的 attribution 链接，但 LLM 仍完全吸收
#   内参学习源（layer=1）通常设为 false
#
# score 字段（1-10，默认 5）：
#   10 = 官方权威源（OpenAI Blog, BIS）
#   8 = 深度分析（Simon Willison, YC Blog）
#   5 = 默认中等
#   1 = 社交噪音（Reddit, Twitter）
#   用于 SVI 计算的 source_score 因子

# 主权公共数据源示例
[[sources]]
name = "US Federal Register - Technology Controls"
type = "rss"
url = "https://www.federalregister.gov/api/v1/documents.rss?conditions[agencies][]=commerce-department&conditions[term]=semiconductor"
category = "Regulatory Compliance"
layer = 2
enabled = true

[[sources]]
name = "Hacker News - Front Page"
type = "rss"
url = "https://hnrss.org/frontpage"
category = "AI Competition"
layer = 3
enabled = true

# AI 生态核心源示例（使用 Direct RSS，非 RSSHub）
[[sources]]
name = "OpenAI Blog"
type = "rss"
url = "https://openai.com/news/rss.xml"
category = "AI"
layer = 2
score = 10
enabled = true

[[sources]]
name = "Anthropic Blog"
type = "rss"
url = "https://www.anthropic.com/rss.xml"
category = "AI"
layer = 2
score = 10
enabled = true

[[sources]]
name = "Google DeepMind Blog"
type = "rss"
url = "https://deepmind.google/blog/rss.xml"
category = "AI"
layer = 2
score = 10
enabled = true

[[sources]]
name = "Simon Willison"
type = "rss"
url = "https://simonwillison.net/atom/everything/"
category = "AI"
layer = 2
score = 8
enabled = true

[[sources]]
name = "a16z Blog"
type = "rss"
url = "https://a16z.com/feed/"
category = "投资"
layer = 2
score = 8
enabled = true

[prompts]
# 自定义你的分析 prompt
# 这是整个系统差异化的核心 —— 你的判断框架编码在这里
base = """
你是一个个人创业者的战略参谋。你的任务不是"总结新闻"，
而是判断这条信息值不值得占用用户今日的注意力。

每篇文章只回答一个核心问题：**这对个人创业者意味着什么？**

精炼判断框架：

1. 战略等级（参考 Moody's/S&P 评级框架）：
   - AAA = 范式转移，需要重新评估产品方向或商业模式
   - AA = 重要信号，影响未来3个月内的决策优先级
   - A = 值得关注，了解即可无需立即行动
   - BBB = 背景信号
   - C = 噪音，无关
2. 对个人创业者的直接利害（一句话概括）
3. 执行力大于信息量——如果一篇文章不能转化成决策，它的价值为零
"""

[prompts.vertical_overrides]
# 按分类覆盖 base prompt
# 这里的 prompt 会注入到红军（Synthesis）和蓝军（Verification）各自的 system prompt 中。
# 这是整个系统的护城河 —— 把你在具体板块独有的判断框架编码在这里。
#
# 每个 override 会被追加在 base prompt 之后、JSON 格式约束之前。
# 红军和蓝军的角色定义（🔴/🔵）已在代码中硬编码，这里只需要写领域专属知识。

"AI" = """
你现在是德勤风险咨询科技合规总监，兼硅谷对冲基金 CTO。
行文要求：冷酷、高频、动词驱动。禁止任何形容词废话。

【核心框架】
1. 四层定位（标注 A/B/C/D）：A=架构, B=训练, C=推理, D=约束
2. 能力问题 vs 成本问题：成本优化不能称为范式转变
3. 证据等级 L1-L5：L1=数学证明, L2=论文实验, L3=工业部署, L4=专家观点, L5=LLM 营销
4. 每个判断附带"最可能错在哪里"反证标注

【产出要求】
💬 summary ≤ 40 字 | 🔴🔵 各 ≤ 60 字，只谈商业不谈技术
每条附带 So What 和反证标注

⚠️ 禁令：禁用"惊人、炸裂、不可否认、双刃剑、值得注意的是、总而言之、时代的浪潮"
"""

