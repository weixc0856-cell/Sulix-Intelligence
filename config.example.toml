# Sulix Intelligence — 配置示例
# 复制为 config.toml 并填入你的设置

# 🔑 API Key 说明
# config.toml 已在 .gitignore 中，不会上传 GitHub。放心在本地填写。
# 也支持环境变量 DEEPSEEK_API_KEY 作为替代方案。

[llm]
api_key = ""  # 填入你的 DeepSeek API Key（本地文件，安全）
# deepseek-v4-flash = 非思考模式（当前使用）
# deepseek-v4-pro   = 带思考模式的推理模型
model = "deepseek-v4-flash"
base_url = "https://api.deepseek.com/v1"
max_tokens = 4096
temperature = 0.3

[output]
# 日报输出目录
vault_path = "./DailyBrief"

[dedup]
window_hours = 48
title_similarity_threshold = 0.85

[storage]
data_dir = "./data"

# ===== Phase A: Scan Agent =====
[scan_agent]
# 启用后，LLM 分析前先做轻量初筛，噪音/广告/PR 稿直接跳过
enabled = true
# 重要性阈值：≤此值的文章跳过（1-3 噪音，4+ 保留）
threshold = 3

# ===== RSS 源 =====
# 在此添加你关注的 RSS 源。每项一个 [[sources]] 块。
#
# layer 字段（预留）：
#   1 = Signal Source（信号源）— 官方博客，信息最准最难读
#   2 = Curated Source（筛选源）— 已有人替你过滤，质量最高
#   3 = Community Source（社区源）— 先于媒体爆发
#   4 = Market Source（市场源）— 比新闻更真实

[[sources]]
name = "Hacker News"
type = "rss"
url = "https://hnrss.org/frontpage"
category = "AI"
layer = 2
enabled = true

[[sources]]
name = "Simon Willison"
type = "rss"
url = "https://simonwillison.net/atom/everything/"
category = "AI"
layer = 2
enabled = true

