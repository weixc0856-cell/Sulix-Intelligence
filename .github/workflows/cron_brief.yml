name: Sulix Intel Daily

on:
  schedule:
    # UTC 00:15 = 北京 08:15（提前 15 分钟对冲 GitHub 排队延迟）
    - cron: '15 0 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Create config from template
        run: cp config.example.toml config.toml

      - name: Create data directories
        run: mkdir -p data

      - name: Run Sulix Intel Pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          VAULT_PATH: "./DailyBrief"
        run: |
          cargo build --release
          cargo run --release

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: astro-frontend/package-lock.json

      - name: Build Astro Frontend
        run: |
          cd astro-frontend
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy astro-frontend/dist/ --project-name=sulix-intelligence

      - name: Commit and Push
        run: |
          git config user.name "Sulix-Bot"
          git config user.email "bot@sulix.com"
          git add content/posts/
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "chore(data): daily brief $(date +%Y-%m-%d)" && git push)
