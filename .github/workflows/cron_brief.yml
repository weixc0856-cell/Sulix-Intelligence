name: Sulix Daily Pipeline

on:
  schedule:
    # UTC 00:15 = 北京 08:15
    - cron: '15 0 * * *'
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - name: Lint
        run: cargo clippy
      - name: Test
        run: cargo test

  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Configure
        run: |
          cp config.ci.toml config.toml
          mkdir -p data DailyBrief content public

      - name: Pull persistent state from R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          # S3 API (reuses upload credentials) — no public URL, no CDN cache
          aws s3 sync s3://sulix-content/state/ DailyBrief/ \
            --endpoint-url "$R2_ENDPOINT" \
            --region auto 2>&1 || echo "⚠️ state sync failed (first run?)"
          # entity_db lives in data/ not DailyBrief/
          aws s3 sync s3://sulix-content/state/ data/ \
            --endpoint-url "$R2_ENDPOINT" \
            --region auto \
            --exclude "*" --include "entity_db.json" 2>&1 || true

          # Full-or-nothing check: if ANY state file exists, ALL must be present & valid
          STATE_FILES="memory_db.json decision_registry.json assessment_registry.json investigation_registry.json"
          FOUND=0
          MISSING=0
          for f in $STATE_FILES; do
            if [ -f "DailyBrief/$f" ]; then
              FOUND=$((FOUND + 1))
            else
              MISSING=$((MISSING + 1))
            fi
          done
          if [ $FOUND -gt 0 ] && [ $MISSING -gt 0 ]; then
            echo "❌ Partial state restore: $FOUND found, $MISSING missing — aborting"
            exit 1
          elif [ $FOUND -eq 0 ]; then
            echo "⚠️ No state files found — first run"
          else
            echo "✅ All $FOUND state files restored"
            for f in $STATE_FILES; do
              if ! jq empty "DailyBrief/$f" 2>/dev/null; then
                echo "❌ Corrupt state file: $f"
                exit 1
              fi
            done
            echo "✅ All state files valid JSON"
          fi

      - name: Run Pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          cargo build --release
          cargo run --release --bin sulix-intel

      - name: Check R2 Manifest
        id: check_manifest
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          MANIFEST=$(curl -sf "$R2_ENDPOINT/sulix-content/manifest.json" 2>/dev/null) || {
            echo "⚠️ manifest.json not found on R2 (pipeline may have early-exited with no new content)"
            echo "no_new_content=true" >> $GITHUB_OUTPUT
            exit 0
          }
          RUN_ID=$(echo "$MANIFEST" | jq -r '.pipeline_run_id // "unknown"')
          echo "📋 Manifest run_id: $RUN_ID (expected: ${{ github.run_id }})"
          if [ "$RUN_ID" = "${{ github.run_id }}" ]; then
            echo "✅ Manifest verified: run_id matches"
          elif [ "$RUN_ID" = "local" ]; then
            echo "⚠️ Manifest run_id is 'local'"
          else
            echo "❌ Manifest run_id mismatch"
            exit 1
          fi

      - name: Trigger Frontend Deploy
        if: success() && steps.check_manifest.outputs.no_new_content != 'true'
        run: |
          echo "🚀 Triggering intel-web deploy..."
          gh workflow run deploy.yml -R weixc0856-cell/Intel-Web
        env:
          GH_TOKEN: ${{ secrets.INTEL_WEB_PAT }}

      - name: Summary
        run: |
          echo "✅ Pipeline complete"
          echo "   R2: state files + content uploaded"
          echo "   Frontend: ${{ (steps.check_manifest.outputs.no_new_content == 'true' && 'skipped (no new content)') || 'triggered' }}"
