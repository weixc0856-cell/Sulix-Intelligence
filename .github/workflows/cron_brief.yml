name: Sulix Daily Pipeline

on:
  schedule:
    # UTC 00:15 = 北京 08:15
    - cron: '15 0 * * *'
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-features

  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Configure
        run: |
          cp config.ci.toml config.toml
          mkdir -p data DailyBrief content public

      - name: Pull persistent state from R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          # S3 API (reuses upload credentials) — no public URL, no CDN cache
          npm install @aws-sdk/client-s3 --silent --no-audit --no-fund 2>/dev/null
          node -e "
            const { S3Client, GetObjectCommand, ListObjectsV2Command } = require('@aws-sdk/client-s3');
            const fs = require('fs');
            const path = require('path');
            const client = new S3Client({
              region: 'auto',
              endpoint: process.env.R2_ENDPOINT,
              credentials: {
                accessKeyId: process.env.R2_ACCESS_KEY_ID,
                secretAccessKey: process.env.R2_SECRET_ACCESS_KEY
              }
            });
            // Key prefix → target dir mapping
            // state/* → DailyBrief/ (default), except specific files that go to data/
            function targetDirForKey(key) {
              if (key === 'state/entity_db.json') return 'data';
              if (key === 'state/intel.db') return 'data';
              if (key === 'state/database.json') return 'data';
              if (key === 'state/event_log.json') return 'data';
              if (key.startsWith('events/')) return 'data/events';
              return 'DailyBrief';
            }
            async function downloadPrefix(prefix) {
              const list = await client.send(new ListObjectsV2Command({ Bucket: 'sulix-content', Prefix: prefix }));
              if (!list.Contents || list.Contents.length === 0) return 0;
              let count = 0;
              for (const obj of list.Contents) {
                const key = obj.Key;
                const baseName = key.replace(prefix, '');
                if (!baseName) continue;
                const targetDir = targetDirForKey(key);
                fs.mkdirSync(targetDir, { recursive: true });
                const localPath = path.join(targetDir, baseName);
                const data = await client.send(new GetObjectCommand({ Bucket: 'sulix-content', Key: key }));
                const chunks = [];
                for await (const chunk of data.Body) { chunks.push(chunk); }
                fs.writeFileSync(localPath, Buffer.concat(chunks));
                console.log('  Restored: ' + localPath);
                count++;
              }
              return count;
            }
            async function main() {
              const stateCount = await downloadPrefix('state/');
              const eventsCount = await downloadPrefix('events/');
              const total = stateCount + eventsCount;
              if (total === 0) {
                console.log('No state files found — first run');
                return;
              }
              console.log('✅ All ' + total + ' files restored (' + stateCount + ' state, ' + eventsCount + ' events)');
              // Full-or-nothing check: 4 critical state files must all exist (or all missing)
              const critical = ['memory_db.json','decision_registry.json','assessment_registry.json','investigation_registry.json'];
              const found = critical.filter(f => fs.existsSync('DailyBrief/' + f)).length;
              const missing = critical.filter(f => !fs.existsSync('DailyBrief/' + f)).length;
              if (found > 0 && missing > 0) {
                console.log('❌ Partial state restore: ' + found + ' found, ' + missing + ' missing');
                process.exit(1);
              }
              if (found === 0) console.log('⚠️ No critical state files — first run');
              else console.log('✅ All critical state files present');
              // Validate JSON integrity for critical files
              for (const f of critical) {
                const p = 'DailyBrief/' + f;
                if (fs.existsSync(p)) {
                  try { JSON.parse(fs.readFileSync(p, 'utf-8')); }
                  catch(e) { console.log('❌ Corrupt state file: ' + f); process.exit(1); }
                }
              }
              if (found > 0) console.log('✅ All state files valid JSON');
            }
            main().catch(e => { console.error(e.message); process.exit(1); });
          " 2>&1

      - name: Run Pipeline
        env:
          RUST_LOG: info
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          cargo build --release -p sulix-cli
          cargo run -p sulix-cli --release

      - name: Upload content to R2
        if: success()
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          npm install @aws-sdk/client-s3 --silent --no-audit --no-fund 2>/dev/null
          node -e "
            const { S3Client, PutObjectCommand } = require('@aws-sdk/client-s3');
            const fs = require('fs');
            const path = require('path');
            const client = new S3Client({
              region: 'auto',
              endpoint: process.env.R2_ENDPOINT,
              credentials: {
                accessKeyId: process.env.R2_ACCESS_KEY_ID,
                secretAccessKey: process.env.R2_SECRET_ACCESS_KEY
              }
            });

            async function uploadFile(localPath, remoteKey) {
              if (!fs.existsSync(localPath)) return 0;
              const stat = fs.statSync(localPath);
              if (!stat.isFile()) return 0;
              const content = fs.readFileSync(localPath);
              await client.send(new PutObjectCommand({
                Bucket: 'sulix-content',
                Key: remoteKey,
                Body: content,
                ContentType: localPath.endsWith('.md') ? 'text/markdown' :
                            localPath.endsWith('.json') ? 'application/json' :
                            localPath.endsWith('.jsonl') ? 'application/jsonl' :
                            'application/octet-stream'
              }));
              console.log('  Uploaded: ' + remoteKey);
              return 1;
            }

            function walkDir(dir, basePrefix) {
              let count = 0;
              if (!fs.existsSync(dir)) return Promise.resolve(0);
              const entries = fs.readdirSync(dir, { withFileTypes: true });
              return Promise.all(entries.map(async entry => {
                const fullPath = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  return walkDir(fullPath, basePrefix + entry.name + '/');
                }
                const remoteKey = basePrefix + entry.name;
                await uploadFile(fullPath, remoteKey);
                return 1;
              })).then(results => results.reduce((a,b) => a + b, 0));
            }

            async function main() {
              let total = 0;

              // Upload thesis MDX (from data/intelligence_mdx/thesis/)
              if (fs.existsSync('data/intelligence_mdx/thesis')) {
                total += await walkDir('data/intelligence_mdx/thesis', 'content/thesis/');
              }
              // Upload decision MDX
              if (fs.existsSync('data/intelligence_mdx/decision')) {
                total += await walkDir('data/intelligence_mdx/decision', 'content/decision/');
              }
              // Upload state files
              const stateFiles = [
                ['data/memory_db.json', 'state/memory_db.json'],
                ['data/decision_history.jsonl', 'state/decision_history.jsonl'],
                ['data/intel.db', 'state/intel.db'],
                ['data/export.json', 'state/export.json'],
              ];
              for (const [local, remote] of stateFiles) {
                total += await uploadFile(local, remote);
              }

              // Generate and upload manifest with file listing
              const publicUrl = process.env.R2_PUBLIC_URL || '';
              const manifest = {
                pipeline_run_id: process.env.GITHUB_RUN_ID || 'local',
                pipeline_trigger: process.env.GITHUB_RUN_TRIGGER || 'manual',
                completed_at: new Date().toISOString(),
                file_count: total,
                files: [
                  'content/thesis/',
                  'content/decision/',
                  'state/memory_db.json',
                  'state/decision_history.jsonl',
                  'state/intel.db',
                  'manifest.json'
                ].filter(f => f.endsWith('/') || fs.existsSync(
                  f.startsWith('content/') ? 'data/intelligence_mdx/' + f.replace('content/','') :
                  f.startsWith('state/') ? f : f
                ))
              };
              // Add individual content files
              const thesisFiles = fs.existsSync('data/intelligence_mdx/thesis')
                ? fs.readdirSync('data/intelligence_mdx/thesis').map(f => 'content/thesis/' + f) : [];
              const decisionFiles = fs.existsSync('data/intelligence_mdx/decision')
                ? fs.readdirSync('data/intelligence_mdx/decision').map(f => 'content/decision/' + f) : [];
              manifest.files = [...thesisFiles, ...decisionFiles, 'state/memory_db.json', 'state/decision_history.jsonl', 'state/intel.db', 'manifest.json'];

              fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2));
              await uploadFile('manifest.json', 'manifest.json');
              total += 1;

              console.log('  Total files uploaded: ' + total);
              if (total > 1) {
                fs.writeFileSync(process.env.GITHUB_OUTPUT || '/dev/null',
                  'upload_count=' + total + '\n', { flag: 'a' });
              }
            }
            main().catch(e => { console.error(e.message); process.exit(1); });
          " 2>&1

      - name: Trigger Frontend Deploy
        if: success()
        env:
          INTEL_WEB_PAT: ${{ secrets.INTEL_WEB_PAT }}
        run: |
          echo "🚀 Triggering intel-web deploy..."
          curl -sf -X POST \
            -H "Authorization: Bearer $INTEL_WEB_PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/weixc0856-cell/Intel-Web/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref":"main"}' && echo "✅ Triggered" || echo "⚠️ Trigger failed (check token permissions)"

      - name: Summary
        run: |
          echo "✅ Pipeline complete"
          echo "   Content: MDX files uploaded to R2"
          echo "   State: memory_db.json + decision_history.jsonl persisted"
