name: Sulix Daily Pipeline

on:
  schedule:
    # UTC 00:15 = 北京 08:15
    - cron: '15 0 * * *'
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - name: Lint
        run: cargo clippy
      - name: Test
        run: cargo test

  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Configure
        run: |
          cp config.ci.toml config.toml
          mkdir -p data DailyBrief content public

      - name: Pull persistent state from R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          # S3 API (reuses upload credentials) — no public URL, no CDN cache
          # Use Node.js with @aws-sdk/client-s3 (pre-installed through Rust cache doesn't help here)
          npm install @aws-sdk/client-s3 --silent --no-audit --no-fund 2>/dev/null
          node -e "
            const { S3Client, GetObjectCommand, ListObjectsV2Command } = require('@aws-sdk/client-s3');
            const fs = require('fs');
            const client = new S3Client({
              region: 'auto',
              endpoint: process.env.R2_ENDPOINT,
              credentials: {
                accessKeyId: process.env.R2_ACCESS_KEY_ID,
                secretAccessKey: process.env.R2_SECRET_ACCESS_KEY
              }
            });
            async function main() {
              const list = await client.send(new ListObjectsV2Command({ Bucket: 'sulix-content', Prefix: 'state/' }));
              if (!list.Contents || list.Contents.length === 0) {
                console.log('No state files found — first run');
                return;
              }
              const count = list.Contents.length;
              for (const obj of list.Contents) {
                const key = obj.Key;
                const filename = key.replace('state/', '');
                // Determine target dir: entity_db.json -> data/, rest -> DailyBrief/
                const targetDir = filename === 'entity_db.json' ? 'data' : 'DailyBrief';
                const data = await client.send(new GetObjectCommand({ Bucket: 'sulix-content', Key: key }));
                const chunks = [];
                for await (const chunk of data.Body) { chunks.push(chunk); }
                fs.writeFileSync(targetDir + '/' + filename, Buffer.concat(chunks));
                console.log('  Restored: ' + targetDir + '/' + filename);
              }
              console.log('✅ All ' + count + ' state files restored');
              // Full-or-nothing check: 4 critical files must all exist
              const critical = ['memory_db.json','decision_registry.json','assessment_registry.json','investigation_registry.json'];
              const found = critical.filter(f => fs.existsSync('DailyBrief/' + f)).length;
              const missing = critical.filter(f => !fs.existsSync('DailyBrief/' + f)).length;
              if (found > 0 && missing > 0) {
                console.log('❌ Partial state restore: ' + found + ' found, ' + missing + ' missing');
                process.exit(1);
              }
              if (found === 0) console.log('⚠️ No critical state files — first run');
              else console.log('✅ All critical state files present');
              // Validate JSON integrity
              for (const f of critical) {
                const p = 'DailyBrief/' + f;
                if (fs.existsSync(p)) {
                  try { JSON.parse(fs.readFileSync(p, 'utf-8')); }
                  catch(e) { console.log('❌ Corrupt state file: ' + f); process.exit(1); }
                }
              }
              if (found > 0) console.log('✅ All state files valid JSON');
            }
            main().catch(e => { console.error(e.message); process.exit(1); });
          " 2>&1

      - name: Run Pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          cargo build --release
          cargo run --release --bin sulix-intel

      - name: Check R2 Manifest
        id: check_manifest
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          MANIFEST=$(curl -sf "$R2_ENDPOINT/sulix-content/manifest.json" 2>/dev/null) || {
            echo "⚠️ manifest.json not found on R2 (pipeline may have early-exited with no new content)"
            echo "no_new_content=true" >> $GITHUB_OUTPUT
            exit 0
          }
          RUN_ID=$(echo "$MANIFEST" | jq -r '.pipeline_run_id // "unknown"')
          echo "📋 Manifest run_id: $RUN_ID (expected: ${{ github.run_id }})"
          if [ "$RUN_ID" = "${{ github.run_id }}" ]; then
            echo "✅ Manifest verified: run_id matches"
          elif [ "$RUN_ID" = "local" ]; then
            echo "⚠️ Manifest run_id is 'local'"
          else
            echo "❌ Manifest run_id mismatch"
            exit 1
          fi

      - name: Trigger Frontend Deploy
        if: success() && steps.check_manifest.outputs.no_new_content != 'true'
        run: |
          echo "🚀 Triggering intel-web deploy..."
          gh workflow run deploy.yml -R weixc0856-cell/Intel-Web
        env:
          GH_TOKEN: ${{ secrets.INTEL_WEB_PAT }}

      - name: Summary
        run: |
          echo "✅ Pipeline complete"
          echo "   R2: state files + content uploaded"
          echo "   Frontend: ${{ (steps.check_manifest.outputs.no_new_content == 'true' && 'skipped (no new content)') || 'triggered' }}"
