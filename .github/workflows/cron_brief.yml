name: Sulix Intel Daily

on:
  schedule:
    # UTC 00:15 = 北京 08:15
    - cron: '15 0 * * *'
  workflow_dispatch:

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Engine Repository
        uses: actions/checkout@v4
        with:
          path: engine
          token: ${{ secrets.INTEL_WEB_PAT }}

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          working-directory: engine

      - name: Configure
        working-directory: engine
        run: |
          cp config.example.toml config.toml
          mkdir -p data

      - name: Run Sulix Pipeline
        working-directory: engine
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          VAULT_PATH: "./output"
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          cargo build --release
          cargo run --release

      - name: Checkout Frontend Repository
        uses: actions/checkout@v4
        with:
          repository: weixc0856-cell/Intel-Web
          token: ${{ secrets.INTEL_WEB_PAT }}
          path: frontend

      - name: Copy MDX Content to Frontend
        run: |
          mkdir -p frontend/src/content/daily
          mkdir -p frontend/src/content/thesis
          mkdir -p frontend/src/content/research
          # Remove legacy .mdx files (switched to .md format)
          find engine/output/ -name "*.mdx" -delete 2>/dev/null || true
          find frontend/src/content/ -name "*.mdx" -delete 2>/dev/null || true
          cp -r engine/output/daily/* frontend/src/content/daily/ 2>/dev/null || true
          cp -r engine/output/thesis/* frontend/src/content/thesis/ 2>/dev/null || true
          mkdir -p frontend/src/content/assessment
          cp -r engine/output/assessment/* frontend/src/content/assessment/ 2>/dev/null || true
          cp -r engine/output/research/* frontend/src/content/research/ 2>/dev/null || true
          cp -r engine/output/reflection/* frontend/src/content/reflection/ 2>/dev/null || true
          mkdir -p frontend/src/content/investigation
          cp -r engine/output/investigation/* frontend/src/content/investigation/ 2>/dev/null || true
          mkdir -p frontend/src/content/decision
          cp -r engine/output/decision/* frontend/src/content/decision/ 2>/dev/null || true
          mkdir -p frontend/src/content/memory
          cp -r engine/output/memory/* frontend/src/content/memory/ 2>/dev/null || true
          cp engine/output/pipeline_report.json frontend/public/pipeline_report.json 2>/dev/null || true
          cp engine/output/manifest.json frontend/public/manifest.json 2>/dev/null || true

      - name: Validate Content Schemas
        working-directory: frontend
        run: npm run build -- --dry-run 2>&1 || (echo "::error::Schema validation failed — MDX frontmatter may not match Zod schemas" && exit 1)

      - name: Detect Missing Content
        run: |
          MISSING=0
          for col in daily thesis assessment research reflection investigation decision memory; do
            count=$(ls -1 frontend/src/content/$col/*.md 2>/dev/null | wc -l)
            echo "  $col: $count files"
          done
          thesis_count=$(ls -1 frontend/src/content/thesis/*.md 2>/dev/null | wc -l)
          if [ "$thesis_count" -eq 0 ]; then
            echo "::error::Critical: thesis content is empty"
            MISSING=1
          fi
          exit $MISSING

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Validate and Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm test
          npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=intel-web
          workingDirectory: frontend

      - name: Commit MDX to Engine Repo
        working-directory: engine
        run: |
          git config user.name "Sulix-Bot"
          git config user.email "bot@sulix.com"
          # Remove legacy .mdx files before committing
          find output/ -name "*.mdx" -delete 2>/dev/null || true
          git rm --cached -r --ignore-unmatch "output/*.mdx" "output/**/*.mdx" 2>/dev/null || true
          git add -f output/
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "chore(data): daily brief $(date +%Y-%m-%d)" && git push)
