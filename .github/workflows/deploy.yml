name: Deploy backend Worker

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Cache worker-build binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/worker-build
            ~/.cargo/bin/wasm-bindgen-cli
          key: worker-build-${{ runner.os }}

      - name: Install worker-build
        run: which worker-build || cargo install worker-build

      - name: Build Worker
        run: worker-build --release
        working-directory: crates/worker-entry

      - name: Deploy to Cloudflare Workers
        working-directory: crates/worker-entry
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --yes wrangler@latest deploy
