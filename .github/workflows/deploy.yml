name: Deploy backend Worker

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Cache worker-build binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/worker-build
            ~/.cargo/bin/wasm-bindgen-cli
          key: worker-build-${{ runner.os }}

      - name: Install worker-build
        run: which worker-build || cargo install worker-build

      - name: Build Worker
        run: worker-build --release
        working-directory: crates/worker-entry

      - name: Deploy to Cloudflare Workers
        working-directory: crates/worker-entry
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --yes wrangler@latest deploy

      - name: Health check
        run: |
          echo "Checking /api/health..."
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://sulix-feed-worker.weixc0856.workers.dev/api/health" --connect-timeout 10)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (HTTP $STATUS)"
              curl -s "https://sulix-feed-worker.weixc0856.workers.dev/api/health"
              echo ""
              exit 0
            fi
            echo "  Attempt $i/5: HTTP $STATUS, waiting..."
            sleep 5
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1
