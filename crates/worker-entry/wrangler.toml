name = "sulix-feed-worker"
main = "build/index.js"
compatibility_date = "2026-07-22"
compatibility_flags = ["nodejs_compat"]

[vars]
AI_BASE_URL = "https://api.deepseek.com/v1"
AI_CHAT_MODEL = "deepseek-v4-flash"
AI_EMBEDDING_MODEL = ""

[triggers]
crons = ["*/30 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "sulix-feed-db"
database_id = "42e589bc-036e-4e1f-8763-bbff092354e0"

[[r2_buckets]]
binding = "RAW_CONTENT"
bucket_name = "sulix-feed-raw"

[[kv_namespaces]]
binding = "CACHE"
id = "38bcc1c3380c4bd99f9e763b6755701f"

[[queues.producers]]
binding = "FETCH_QUEUE"
queue = "sulix-feed-fetch-queue"

[[queues.consumers]]
queue = "sulix-feed-fetch-queue"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "sulix-feed-fetch-dlq"

[[vectorize]]
binding = "VECTORIZE"
index_name = "sulix-article-embeddings"
